# Dependabot configuration for security alerts only
# Version update PRs are disabled - only security alerts will be shown in Security tab
# To manually update dependencies, run updates locally or use @dependabot commands on issues
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Docker dependencies
  - package-ecosystem: "docker"
    directory: "/server"
    schedule:
      interval: "weekly"
    target-branch: "main"
    open-pull-requests-limit: 0
  - package-ecosystem: "docker"
    directory: "/client"
    schedule:
      interval: "weekly"
    target-branch: "main"
    open-pull-requests-limit: 0
  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    target-branch: "main"
    open-pull-requests-limit: 0

  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/server"
    schedule:
      interval: "weekly"
    target-branch: "main"
    open-pull-requests-limit: 0
  - package-ecosystem: "pip"
    directory: "/client"
    schedule:
      interval: "weekly"
    target-branch: "main"
    open-pull-requests-limit: 0
  - package-ecosystem: "pip"
    directory: "/windows_client"
    schedule:
      interval: "weekly"
    target-branch: "main"
    open-pull-requests-limit: 0
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "main"
    open-pull-requests-limit: 0

  # Node.js dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    target-branch: "main"
    open-pull-requests-limit: 0
    groups:
      npm_and_yarn:
        patterns:
          - "*"

  # Swift dependencies (macOS client)
  - package-ecosystem: "swift"
    directory: "/macos_client"
    schedule:
      interval: "weekly"
    target-branch: "main"
    open-pull-requests-limit: 0

  # Ruby dependencies (macOS client - Fastlane)
  - package-ecosystem: "bundler"
    directory: "/macos_client"
    schedule:
      interval: "weekly"
    target-branch: "main"
    open-pull-requests-limit: 0

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    target-branch: "main"
    open-pull-requests-limit: 0
