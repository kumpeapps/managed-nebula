              schema:
                type: array
                items:
                  type: object
                  properties:
                    type:
                      type: string
                      example: managed_nebula_client_token
                    pattern:
                      type: string
                      example: mnebula_[a-z0-9]{32}
                    description:
                      type: string
                      example: Managed Nebula Client Token

  /api/v1/github/secret-scanning/verify:
    post:
      tags: [github]
      summary: Verify leaked secrets
      description: GitHub webhook endpoint to verify if tokens are valid (GitHub only)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                  token:
                    type: string
                  url:
                    type: string
      responses:
        '200':
          description: Verification results
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    token:
                      type: string
                    type:
                      type: string
                    label:
                      type: string
                    url:
                      type: string
                    is_active:
                      type: boolean
        '400':
          description: Invalid request
        '401':
          description: Invalid GitHub signature

  /api/v1/github/secret-scanning/revoke:
    post:
      tags: [github]
      summary: Revoke leaked secrets
      description: GitHub webhook endpoint to auto-revoke leaked tokens (GitHub only)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  type:
                    type: string
                  token:
                    type: string
                  url:
                    type: string
      responses:
        '200':
          description: Revocation results
          content:
            application/json:
              schema:
                type: object
                properties:
                  revoked_count:
                    type: integer
        '400':
          description: Invalid request
        '401':
          description: Invalid GitHub signature

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: session
      description: Session-based authentication via login endpoint
    
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
      description: |
        API key authentication using Bearer token format.
        
        **Setup in RapidAPI/Paw:**
        1. Create environment variable: `apiKey` = `mnapi_your_api_key_here`
        2. In Authorization, select "Bearer Token"
        3. Set token to: `{{apiKey}}` or use the environment variable
        
        **Setup in Postman:**
        1. Collection Variables → Add `apiKey` = `mnapi_your_api_key_here`
        2. Authorization will automatically use: `Bearer {{apiKey}}`
        
        **Format**: `Bearer mnapi_<64-hex-chars>`
        
        **Example**: `Authorization: Bearer mnapi_1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef`
        
        To create an API key:
        1. Login to the web UI at http://localhost:8080
        2. Go to Profile → API Keys tab
        3. Click "Create API Key"
        4. Copy the key (shown only once!)
        5. Use it as: `Authorization: Bearer mnapi_...`
    
    clientToken:
      type: apiKey
      in: header
      name: X-Client-Token
      description: Client token authentication for client agents

