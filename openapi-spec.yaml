# Collection-level configuration for API clients
x-collection-variables:
  - key: apiKey
    value: mnapi_your_api_key_here
    description: Your Managed Nebula API key. Get from Profile > API Keys in web UI.
    type: string
  - key: baseUrl
    value: http://localhost:8080
    description: Base URL of your Managed Nebula server
    type: string

# RapidAPI/Paw Desktop Environment Configuration
# To use in RapidAPI/Paw:
# 1. Preferences → Environments → Add new environment
# 2. Add variable: apiKey = mnapi_your_api_key_here
# 3. In each request, Authorization → Bearer Token → {{apiKey}}

x-postman-info:
  name: Managed Nebula API
  description: Complete API collection for Managed Nebula mesh VPN platform
  schema: https://schema.getpostman.com/json/collection/v2.1.0/collection.json

x-readme:
  samples-languages:
    - curl
    - node
    - python
    - javascript
    - php
  explorer-enabled: true
  
x-code-samples:
  - lang: curl
    label: cURL
    source: |
      curl -X GET "http://localhost:8080/clients" \
           -H "Authorization: Bearer mnapi_your_api_key_here" \
           -H "Content-Type: application/json"
  
  - lang: python
    label: Python (requests)
    source: |
      import requests
      
      API_KEY = "mnapi_your_api_key_here"
      BASE_URL = "http://localhost:8080"
      
      headers = {
          "Authorization": f"Bearer {API_KEY}",
          "Content-Type": "application/json"
      }
      
      response = requests.get(f"{BASE_URL}/clients", headers=headers)
      clients = response.json()
  
  - lang: javascript
    label: JavaScript (fetch)
    source: |
      const API_KEY = 'mnapi_your_api_key_here';
      const BASE_URL = 'http://localhost:8080';
      
      fetch(`${BASE_URL}/clients`, {
        headers: {
          'Authorization': `Bearer ${API_KEY}`,
          'Content-Type': 'application/json'
        }
      })
      .then(res => res.json())
      .then(clients => console.log(clients));
  
  - lang: node
    label: Node.js (axios)
    source: |
      const axios = require('axios');
      
      const API_KEY = 'mnapi_your_api_key_here';
      const BASE_URL = 'http://localhost:8080';
      
      const client = axios.create({
        baseURL: BASE_URL,
        headers: {
          'Authorization': `Bearer ${API_KEY}`,
          'Content-Type': 'application/json'
        }
      });
      
      client.get('/clients')
        .then(response => console.log(response.data));
