openapi: 3.0.3
info:
  title: Managed Nebula API
  description: |
    REST API for Managed Nebula - A mesh VPN management platform built on Nebula.
    
    ## Quick Start with API Keys
    
    1. **Get an API Key**: Login to the web UI → Profile → API Keys tab → Create API Key
    2. **Set the `apiKey` variable**: In your API client (Paw, Postman, etc.), create a variable named `apiKey` with your full key (e.g., `mnapi_1234...`)
    3. **Make requests**: All authenticated endpoints will automatically use `Bearer {apiKey}` authentication
    
    ## Using with Different Tools
    
    ### Postman
    ```
    1. Import this OpenAPI spec
    2. In Environments, create a new variable: `apiKey` = `mnapi_your_key_here`
    3. Requests will automatically use: Authorization: Bearer {{apiKey}}
    ```
    
    ### Paw (RapidAPI)
    ```
    1. Import this OpenAPI spec
    2. Set Environment Variable: apiKey = mnapi_your_key_here
    3. The bearer token will be automatically configured
    ```
    
    ### cURL Example
    ```bash
    curl -H "Authorization: Bearer mnapi_your_key_here" \
         https://your-server:8080/clients
    ```
    
    ## Authentication
    
    The API supports three authentication methods:
    
    1. **Session-based (Web UI)**: Login via `/api/v1/auth/login` and use session cookies
    2. **API Keys (Recommended)**: Use `Authorization: Bearer mnapi_<key>` header for programmatic access
    3. **Client Tokens**: Used by client agents to fetch configurations
    
    ## Authorization
    
    - Most endpoints require authentication
    - Admin-only endpoints are marked in their descriptions
    - API keys can have scope restrictions (groups, IP pools, created clients only)
    
    ## Rate Limiting
    
    No rate limiting is currently enforced, but it may be added in future versions.
    
    ## Versioning
    
    All endpoints are versioned under `/api/v1/`. Breaking changes will introduce new version paths.
  version: 1.0.0
  contact:
    name: Managed Nebula Support
    url: https://github.com/kumpeapps/managed-nebula
  license:
    name: MIT
    url: https://github.com/kumpeapps/managed-nebula/blob/main/LICENSE

servers:
  - url: http://localhost:8080
    description: Local development server
  - url: https://api.managednebula.example.com
    description: Production server (example)

tags:
  - name: auth
    description: Authentication and user profile management
  - name: clients
    description: Nebula client (node) management
  - name: groups
    description: Client groups for organizing nodes
  - name: firewall-rulesets
    description: Firewall ruleset management
  - name: ip-pools
    description: IP address pool management
  - name: ip-groups
    description: IP group management for certificate IP restrictions
  - name: ca
    description: Certificate Authority management
  - name: users
    description: User account management (admin only)
  - name: user-groups
    description: User group management for permissions
  - name: api-keys
    description: API key management for programmatic access
  - name: permissions
    description: Permission and access control management
  - name: settings
    description: System settings and configuration
  - name: version
    description: Version information and status
  - name: github
    description: GitHub integrations (secret scanning)
  - name: public
    description: Public endpoints (no authentication required)
  - name: health
    description: Health check endpoints

security:
  - bearerAuth: []
  - sessionAuth: []

paths:
  # ==================== Authentication ====================
  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: Login
      description: Authenticate user and create session
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: admin@example.com
                password:
                  type: string
                  format: password
                  example: changeme
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          description: Invalid credentials
        '403':
          description: User inactive

  /api/v1/auth/logout:
    post:
      tags: [auth]
      summary: Logout
      description: Clear session and logout
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true

  /api/v1/auth/me:
    get:
      tags: [auth]
      summary: Get current user
      description: Get authenticated user information
      responses:
        '200':
          description: Current user information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          description: Not authenticated
    
    put:
      tags: [auth]
      summary: Update current user profile
      description: Update email and/or password for current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [current_password]
              properties:
                email:
                  type: string
                  format: email
                  description: New email (optional)
                current_password:
                  type: string
                  format: password
                  description: Current password for verification
                new_password:
                  type: string
                  format: password
                  description: New password (optional)
      responses:
        '200':
          description: Profile updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          description: Current password incorrect
        '403':
          description: Users are managed externally
        '409':
          description: Email already exists

  # ==================== Health & Status ====================
  /healthz:
    get:
      tags: [health]
      summary: Health check
      description: Check if the API is running
      security: []
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /warnings:
    get:
      tags: [health]
      summary: Get system warnings
      description: Get system warnings and configuration issues
      responses:
        '200':
          description: List of warnings
          content:
            application/json:
              schema:
                type: object
                properties:
                  warnings:
                    type: array
                    items:
                      type: string

  /version:
    get:
      tags: [version]
      summary: Get version information
      description: Get server and Nebula version information
      responses:
        '200':
          description: Version information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'

  /version-status:
    get:
      tags: [version]
      summary: Get version status
      description: Get version update status and security advisories
      responses:
        '200':
          description: Version status information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionStatusResponse'

  # ==================== Clients ====================
  /clients:
    get:
      tags: [clients]
      summary: List all clients
      description: Get list of all Nebula clients. Results filtered by API key scope if using API key auth.
      security:
        - bearerAuth: []
        - sessionAuth: []
      responses:
        '200':
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClientResponse'
              examples:
                success:
                  summary: Successful response
                  value:
                    - id: 1
                      name: web-server-01
                      ip_address: 10.0.0.10
                      is_lighthouse: false
                      is_blocked: false
                      groups:
                        - id: 1
                          name: web-servers
                      firewall_rulesets:
                        - id: 1
                          name: default-web
    
    post:
      tags: [clients]
      summary: Create new client
      description: Create a new Nebula client node
      security:
        - bearerAuth: []
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientCreate'
            examples:
              basic:
                summary: Basic client
                value:
                  name: web-server-01
                  pool_id: 1
                  group_ids: [1]
              lighthouse:
                summary: Lighthouse node
                value:
                  name: lighthouse-01
                  is_lighthouse: true
                  public_ip: 1.2.3.4
                  pool_id: 1
      responses:
        '200':
          description: Client created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientResponse'
        '400':
          description: Invalid request
        '409':
          description: Client name already exists

  /clients/{client_id}:
    get:
      tags: [clients]
      summary: Get client by ID
      description: Get detailed information about a specific client
      parameters:
        - $ref: '#/components/parameters/ClientIdPath'
      responses:
        '200':
          description: Client details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientResponse'
        '403':
          description: Access denied (API key scope)
        '404':
          description: Client not found
    
    put:
      tags: [clients]
      summary: Update client
      description: Update client configuration
      parameters:
        - $ref: '#/components/parameters/ClientIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientUpdate'
      responses:
        '200':
          description: Client updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientResponse'
        '400':
          description: Invalid request
        '403':
          description: Access denied
        '404':
          description: Client not found
    
    delete:
      tags: [clients]
      summary: Delete client
      description: Delete a client and all associated data
      parameters:
        - $ref: '#/components/parameters/ClientIdPath'
      responses:
        '200':
          description: Client deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        '403':
          description: Access denied
        '404':
          description: Client not found

  /clients/{client_id}/alternate-ips:
    post:
      tags: [clients]
      summary: Add alternate IP to client
      description: Assign an additional IP address to a client (for v2 certificate multi-IP support)
      parameters:
        - $ref: '#/components/parameters/ClientIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pool_id]
              properties:
                pool_id:
                  type: integer
                  description: IP pool to allocate from
                ip_address:
                  type: string
                  description: Specific IP to assign (optional, auto-allocated if not provided)
      responses:
        '201':
          description: IP assigned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IPAssignmentResponse'
        '400':
          description: Invalid request
        '403':
          description: Access denied
        '404':
          description: Client or pool not found
        '409':
          description: IP already assigned

  /clients/{client_id}/alternate-ips/{ip_assignment_id}:
    delete:
      tags: [clients]
      summary: Remove alternate IP from client
      description: Remove an IP assignment from a client
      parameters:
        - $ref: '#/components/parameters/ClientIdPath'
        - name: ip_assignment_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: IP removed successfully
        '403':
          description: Access denied or cannot remove primary IP
        '404':
          description: Client or IP assignment not found

  /clients/{client_id}/owner:
    put:
      tags: [clients]
      summary: Update client owner
      description: Change the owner of a client (admin only)
      parameters:
        - $ref: '#/components/parameters/ClientIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [owner_user_id]
              properties:
                owner_user_id:
                  type: integer
                  nullable: true
                  description: New owner user ID (null to remove owner)
      responses:
        '200':
          description: Owner updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientResponse'
        '403':
          description: Admin only
        '404':
          description: Client or user not found

  /clients/{client_id}/permissions:
    get:
      tags: [clients, permissions]
      summary: List client permissions
      description: Get all permissions granted for a specific client
      parameters:
        - $ref: '#/components/parameters/ClientIdPath'
      responses:
        '200':
          description: List of permissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClientPermissionResponse'
        '403':
          description: Access denied
        '404':
          description: Client not found
    
    post:
      tags: [clients, permissions]
      summary: Grant client permission
      description: Grant a permission to a user or user group for a specific client
      parameters:
        - $ref: '#/components/parameters/ClientIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientPermissionGrant'
      responses:
        '200':
          description: Permission granted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientPermissionResponse'
        '400':
          description: Invalid request
        '403':
          description: Access denied
        '404':
          description: Client, user, or permission not found
        '409':
          description: Permission already granted

  /clients/{client_id}/permissions/{permission_id}:
    delete:
      tags: [clients, permissions]
      summary: Revoke client permission
      description: Revoke a permission for a client
      parameters:
        - $ref: '#/components/parameters/ClientIdPath'
        - name: permission_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Permission revoked successfully
        '403':
          description: Access denied
        '404':
          description: Client or permission not found

  /clients/{client_id}/certificates:
    get:
      tags: [clients]
      summary: List client certificates
      description: Get all certificates issued for a client
      parameters:
        - $ref: '#/components/parameters/ClientIdPath'
      responses:
        '200':
          description: List of certificates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ClientCertificateResponse'
        '403':
          description: Access denied
        '404':
          description: Client not found

  /clients/{client_id}/certificates/reissue:
    post:
      tags: [clients]
      summary: Reissue client certificate
      description: Force reissue of client certificate (for IP/group changes or rotation)
      parameters:
        - $ref: '#/components/parameters/ClientIdPath'
      responses:
        '200':
          description: Certificate reissued successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientCertificateResponse'
        '403':
          description: Access denied
        '404':
          description: Client not found
        '503':
          description: No active CA available

  /clients/{client_id}/certificates/{cert_id}/revoke:
    post:
      tags: [clients]
      summary: Revoke client certificate
      description: Revoke a specific certificate for a client
      parameters:
        - $ref: '#/components/parameters/ClientIdPath'
        - name: cert_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Certificate revoked successfully
        '403':
          description: Access denied
        '404':
          description: Client or certificate not found

  /clients/{client_id}/config:
    get:
      tags: [clients]
      summary: Get client configuration
      description: Download Nebula configuration YAML for a client
      parameters:
        - $ref: '#/components/parameters/ClientIdPath'
      responses:
        '200':
          description: Configuration YAML
          content:
            application/x-yaml:
              schema:
                type: string
            text/plain:
              schema:
                type: string
        '403':
          description: Access denied or client blocked
        '404':
          description: Client not found
        '409':
          description: No IP assigned to client
        '503':
          description: No active CA available

  /clients/{client_id}/docker-compose:
    get:
      tags: [clients]
      summary: Get Docker Compose configuration
      description: Get Docker Compose YAML for deploying the client as a container
      parameters:
        - $ref: '#/components/parameters/ClientIdPath'
      responses:
        '200':
          description: Docker Compose YAML
          content:
            application/x-yaml:
              schema:
                type: string
        '403':
          description: Access denied
        '404':
          description: Client not found

  /client/config:
    post:
      tags: [clients]
      summary: Client agent config fetch
      description: Endpoint for client agents to fetch their configuration (uses client token authentication)
      security:
        - clientToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: Client token for authentication
                  example: mnebula_abcdef1234567890abcdef12
                public_key:
                  type: string
                  description: Client's Nebula public key (for certificate signing)
                client_version:
                  type: string
                  description: Client version (optional)
                  example: 1.0.0
                nebula_version:
                  type: string
                  description: Nebula version (optional)
                  example: 1.9.0
      responses:
        '200':
          description: Configuration and certificates
          content:
            application/json:
              schema:
                type: object
                properties:
                  config:
                    type: string
                    description: Nebula YAML configuration
                  client_cert_pem:
                    type: string
                    description: Client certificate in PEM format
                  ca_chain_pems:
                    type: array
                    items:
                      type: string
                    description: CA certificate chain in PEM format
        '401':
          description: Invalid token
        '403':
          description: Client blocked
        '503':
          description: No active CA available

  # ==================== Groups ====================
  /groups:
    get:
      tags: [groups]
      summary: List all groups
      description: Get list of all client groups
      responses:
        '200':
          description: List of groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GroupResponse'
    
    post:
      tags: [groups]
      summary: Create new group
      description: Create a new client group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupCreate'
      responses:
        '200':
          description: Group created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'
        '400':
          description: Invalid request
        '409':
          description: Group name already exists

  /groups/{group_id}:
    get:
      tags: [groups]
      summary: Get group by ID
      description: Get detailed information about a specific group
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Group details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'
        '404':
          description: Group not found
    
    put:
      tags: [groups]
      summary: Update group
      description: Update group information
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupUpdate'
      responses:
        '200':
          description: Group updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'
        '400':
          description: Invalid request
        '404':
          description: Group not found
    
    delete:
      tags: [groups]
      summary: Delete group
      description: Delete a group (fails if clients are still using it)
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Group deleted successfully
        '404':
          description: Group not found
        '409':
          description: Group still has clients

  /groups/{group_id}/permissions:
    get:
      tags: [groups, permissions]
      summary: List group permissions
      description: Get all permissions granted for a specific group
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: List of permissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GroupPermissionResponse'
        '404':
          description: Group not found
    
    post:
      tags: [groups, permissions]
      summary: Grant group permission
      description: Grant a permission to a user or user group for a specific group
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GroupPermissionGrant'
      responses:
        '200':
          description: Permission granted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupPermissionResponse'
        '400':
          description: Invalid request
        '404':
          description: Group, user, or permission not found
        '409':
          description: Permission already granted

  /groups/{group_id}/permissions/{permission_id}:
    delete:
      tags: [groups, permissions]
      summary: Revoke group permission
      description: Revoke a permission for a group
      parameters:
        - name: group_id
          in: path
          required: true
          schema:
            type: integer
        - name: permission_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Permission revoked successfully
        '404':
          description: Group or permission not found

  # ==================== Firewall Rulesets ====================
  /firewall-rulesets:
    get:
      tags: [firewall-rulesets]
      summary: List all firewall rulesets
      description: Get list of all firewall rulesets
      responses:
        '200':
          description: List of firewall rulesets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FirewallRulesetResponse'
    
    post:
      tags: [firewall-rulesets]
      summary: Create new firewall ruleset
      description: Create a new firewall ruleset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FirewallRulesetCreate'
      responses:
        '200':
          description: Ruleset created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FirewallRulesetResponse'
        '400':
          description: Invalid YAML or request
        '409':
          description: Ruleset name already exists

  /firewall-rulesets/{ruleset_id}:
    get:
      tags: [firewall-rulesets]
      summary: Get firewall ruleset by ID
      description: Get detailed information about a specific firewall ruleset
      parameters:
        - name: ruleset_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Ruleset details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FirewallRulesetResponse'
        '404':
          description: Ruleset not found
    
    put:
      tags: [firewall-rulesets]
      summary: Update firewall ruleset
      description: Update firewall ruleset configuration
      parameters:
        - name: ruleset_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FirewallRulesetUpdate'
      responses:
        '200':
          description: Ruleset updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FirewallRulesetResponse'
        '400':
          description: Invalid YAML or request
        '404':
          description: Ruleset not found
    
    delete:
      tags: [firewall-rulesets]
      summary: Delete firewall ruleset
      description: Delete a firewall ruleset (fails if clients are still using it)
      parameters:
        - name: ruleset_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Ruleset deleted successfully
        '404':
          description: Ruleset not found
        '409':
          description: Ruleset still has clients

  # ==================== IP Pools ====================
  /ip-pools:
    get:
      tags: [ip-pools]
      summary: List all IP pools
      description: Get list of all IP address pools
      responses:
        '200':
          description: List of IP pools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IPPoolResponse'
    
    post:
      tags: [ip-pools]
      summary: Create new IP pool
      description: Create a new IP address pool
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IPPoolCreate'
      responses:
        '200':
          description: Pool created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IPPoolResponse'
        '400':
          description: Invalid CIDR or request

  /ip-pools/{pool_id}:
    get:
      tags: [ip-pools]
      summary: Get IP pool by ID
      description: Get detailed information about a specific IP pool
      parameters:
        - name: pool_id
